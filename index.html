<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b1d3a" />
<title>Scriptures Completed</title>

<style>
  /* ============================================================
     COLORS / THEME
     ============================================================ */
  :root{
    --bg:#081730;          /* deep navy */
    --bg2:#0e2347;
    --card:rgba(255,255,255,0.05);
    --border:rgba(214,169,63,0.22);  /* warm gold-tinted edges */
    --text:#f7f2e4;        /* cream */
    --muted:#a9b6cf;       /* soft slate */
    --accent:#d6a93f;      /* rich gold */
    --accent2:#e6c879;     /* soft gold */
    --danger:#e0796b;
    --ok:#7fc8a0;          /* green kept only for the live-sync dot */
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg),var(--bg2));
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:560px; margin:0 auto; padding:18px 16px 48px;}

  header.app{
    text-align:center;
    padding:18px 8px 8px;
  }
  header.app h1{
    margin:0;
    font-size:1.3rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--text);
    font-weight:800;
  }
  header.app h1 span{color:var(--accent);}
  .sync{
    margin-top:6px;
    font-size:.78rem;
    color:var(--muted);
    display:inline-flex; align-items:center; gap:7px;
  }
  .dot{width:9px;height:9px;border-radius:50%;background:#777;display:inline-block;transition:background .3s;}
  .dot.live{background:var(--ok); box-shadow:0 0 10px var(--ok);}
  .dot.off{background:var(--danger);}

  /* ============================================================
     HERO COUNT
     ============================================================ */
  .hero{
    margin:22px 0 14px;
    text-align:center;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:30px 16px 26px;
    box-shadow:0 12px 40px rgba(0,0,0,.30);
  }
  .hero .label{
    font-size:.82rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); font-weight:700;
  }
  .hero .total{
    font-size:clamp(3.6rem, 22vw, 6.5rem);
    line-height:1;
    font-weight:900;
    color:var(--accent);
    margin:8px 0 4px;
    font-variant-numeric:tabular-nums;
    text-shadow:0 4px 26px rgba(214,169,63,.32);
    transition:transform .18s ease;
  }
  .hero .total.bump{transform:scale(1.06);}
  .hero .sub{font-size:.95rem; color:var(--muted);}
  .goalbar{
    margin:18px auto 4px; max-width:340px; height:10px; border-radius:6px;
    background:rgba(255,255,255,0.08); overflow:hidden;
  }
  .goalbar-fill{
    height:100%; width:0%; border-radius:6px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .5s ease;
  }
  .goalpct{font-size:.8rem; color:var(--muted); margin-top:8px;}
  .goalpct b{color:var(--accent);}

  /* ============================================================
     STAT CARDS
     ============================================================ */
  .stats{
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px;
  }
  .stat{
    background:var(--card); border:1px solid var(--border);
    border-radius:18px; padding:18px 14px; text-align:center;
  }
  .stat .num{font-size:2rem; font-weight:800; font-variant-numeric:tabular-nums;}
  .stat .num.green{color:var(--accent2);}
  .stat .cap{font-size:.74rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-top:5px;}

  /* ============================================================
     DAILY TOTALS
     ============================================================ */
  .daily{
    margin-top:14px; background:var(--card); border:1px solid var(--border);
    border-radius:18px; padding:16px 16px 14px;
  }
  .daily-title{
    font-size:.74rem; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); font-weight:700; text-align:center; margin-bottom:10px;
  }
  .daily-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:11px 12px; border-radius:12px; margin-bottom:6px;
    background:rgba(255,255,255,0.03); border:1px solid transparent;
  }
  .daily-row:last-child{margin-bottom:0;}
  .daily-row.today{
    border-color:var(--accent); background:rgba(214,169,63,0.10);
  }
  .daily-row .day{font-weight:700; font-size:1rem; display:flex; align-items:center; gap:8px;}
  .daily-row .day .goal{font-size:.68rem; color:var(--accent); letter-spacing:.05em;}
  .daily-row .day .live{font-size:.62rem; color:var(--ok); letter-spacing:.08em; text-transform:uppercase;}
  .daily-row .day .met{font-size:.85rem; color:var(--ok); font-weight:800;}
  .daily-row .val{font-weight:800; font-size:1.15rem; color:var(--accent); font-variant-numeric:tabular-nums;}
  .daily-row .val small{font-size:.68rem; color:var(--muted); font-weight:600; display:block; text-align:right;}
  .daily-foot{font-size:.72rem; color:var(--muted); text-align:center; margin-top:10px; line-height:1.5;}

  /* ============================================================
     BUTTONS / ADMIN
     ============================================================ */
  .adminbar{margin-top:26px; text-align:center;}
  button{
    font-family:inherit; cursor:pointer; border:none; border-radius:14px;
    font-weight:700; transition:transform .08s ease, opacity .2s, background .2s;
  }
  button:active{transform:scale(.97);}
  button:disabled{opacity:.5; cursor:not-allowed;}

  .btn-ghost{
    background:transparent; color:var(--muted); border:1px solid var(--border);
    padding:12px 20px; font-size:.9rem; letter-spacing:.05em;
  }

  .admin{
    margin-top:18px;
    background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:18px 16px 22px;
  }
  .admin h2{
    margin:0 0 14px; font-size:.9rem; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); text-align:center;
  }

  .btn-plus{
    width:100%; background:var(--accent); color:#0a1730;
    font-size:1.7rem; padding:26px 10px; border-radius:18px; letter-spacing:.02em;
    box-shadow:0 8px 24px rgba(214,169,63,.38);
  }

  .row{display:flex; gap:10px; margin-top:14px; align-items:stretch;}
  .row input{
    flex:1; min-width:0; background:rgba(0,0,0,.25); color:var(--text);
    border:1px solid var(--border); border-radius:12px; padding:14px;
    font-size:1.1rem; font-family:inherit; text-align:center;
  }
  .row input:focus{outline:none; border-color:var(--accent);}
  .btn-sm{padding:0 18px; font-size:1rem; background:#27406e; color:var(--text); border:1px solid var(--border);}
  .btn-sm.danger{background:transparent; color:var(--danger); border:1px solid rgba(255,107,107,.5);}
  .btn-sm.go{background:var(--accent); color:#3a2c00;}

  .field{margin-top:16px;}
  .field label{display:block; font-size:.78rem; color:var(--muted); margin-bottom:6px; letter-spacing:.05em;}

  .note{font-size:.74rem; color:var(--muted); text-align:center; margin-top:16px; line-height:1.5;}

  /* login box */
  .login{margin-top:18px; text-align:center;}
  .login input{
    width:100%; background:rgba(0,0,0,.25); color:var(--text);
    border:1px solid var(--border); border-radius:12px; padding:14px;
    font-size:1.1rem; font-family:inherit; text-align:center; letter-spacing:.2em;
  }
  .login input:focus{outline:none; border-color:var(--accent);}
  .login .btn-go{margin-top:12px; width:100%; background:var(--accent); color:#3a2c00; padding:16px; font-size:1.05rem;}
  .err{color:var(--danger); font-size:.85rem; margin-top:10px; min-height:1em;}

  /* ============================================================
     CELEBRATIONS
     ============================================================ */
  .celebrate{
    position:fixed; inset:0; z-index:1000;
    display:flex; align-items:center; justify-content:center;
    background:rgba(4,12,28,.82);
    opacity:0; pointer-events:none; transition:opacity .4s ease;
  }
  .celebrate.show{opacity:1; pointer-events:auto;}
  #cfx{position:fixed; inset:0; z-index:1001; pointer-events:none;}
  .celebrate-card{position:relative; z-index:1002; text-align:center; padding:0 26px; max-width:520px;}
  .cel-icon{font-size:72px; line-height:1; animation:celpop .6s cubic-bezier(.2,1.3,.4,1);}
  .cel-head{
    margin-top:12px; font-weight:900; color:var(--accent);
    text-transform:uppercase; letter-spacing:.02em;
    font-size:clamp(2rem,9vw,3.2rem); line-height:1.05;
  }
  .cel-num{
    margin-top:4px; font-weight:900; color:var(--text);
    font-size:clamp(2.6rem,13vw,4.2rem); font-variant-numeric:tabular-nums;
    text-shadow:0 4px 30px rgba(214,169,63,.45);
  }
  .cel-sub{margin-top:14px; font-size:1.05rem; color:#cdd6e8; line-height:1.5;}
  .cel-close{
    position:fixed; top:16px; right:16px; z-index:1003;
    width:46px; height:46px; border-radius:50%; border:none;
    background:rgba(255,255,255,.15); color:var(--text); font-size:22px; cursor:pointer;
  }
  @keyframes celpop{0%{transform:scale(0) rotate(-18deg);}100%{transform:scale(1) rotate(0);}}

  .hidden{display:none !important;}

  footer{margin-top:30px; text-align:center; font-size:.72rem; color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <!-- ======================================================== -->
  <!-- HEADER                                                    -->
  <!-- ======================================================== -->
  <header class="app">
    <h1 id="appTitle">Scriptures Completed</h1>
    <div class="sync"><span class="dot" id="syncDot"></span><span id="syncText">Connecting…</span></div>
  </header>

  <!-- ======================================================== -->
  <!-- PUBLIC DASHBOARD                                          -->

  <section class="hero">
    <div class="label">Total Scriptures Completed</div>
    <div class="total" id="totalCount">—</div>
    <div class="sub" id="heroSub">&nbsp;</div>
    <div class="goalbar"><div class="goalbar-fill" id="goalFill"></div></div>
    <div class="goalpct" id="goalPct">&nbsp;</div>
  </section>

  <div class="stats">
    <div class="stat">
      <div class="num" id="boxCount">—</div>
      <div class="cap">Boxes Completed</div>
    </div>
    <div class="stat">
      <div class="num green" id="perHour">—</div>
      <div class="cap">Average / Hour</div>
    </div>
  </div>

  <!-- DAILY TOTALS (auto-populated) -->

    <div class="daily-title">Daily Totals</div>

  </section>

  <!-- ======================================================== -->
  <!-- ADMIN TOGGLE                                              -->
  <!-- ======================================================== -->
  <div class="adminbar">

    <button class="btn-plus" id="plusBox">+1 Box</button>

    <div class="field">
      <label>Add a specific number of boxes</label>
      <div class="row">
        <input type="number" id="addBoxesInput" inputmode="numeric" placeholder="e.g. 5" />
        <button class="btn-sm go" id="addBoxesBtn">Add</button>
      </div>
    </div>

    <div class="field">
      <label>Set total completed boxes (overwrite)</label>
      <div class="row">
        <input type="number" id="setBoxesInput" inputmode="numeric" placeholder="exact box count" />
        <button class="btn-sm" id="setBoxesBtn">Set</button>
      </div>
    </div>

    <div class="field">
      <label>Correct a mistake</label>
      <div class="row">
        <button class="btn-sm danger" id="minusBox" style="flex:1;">− Remove 1 Box</button>
      </div>
    </div>

    <div class="field">
      <label>Booklets per box</label>
      <div class="row">
        <input type="number" id="perBoxInput" inputmode="numeric" placeholder="booklets per box" />
        <button class="btn-sm go" id="perBoxBtn">Save</button>
      </div>
    </div>

    <div class="field">
      <label>Preview celebrations (this device only — not broadcast)</label>
      <div class="row">
        <button class="btn-sm" id="test10k" style="flex:1;">🎉 10k</button>
        <button class="btn-sm" id="test150" style="flex:1;">🚩 Halfway</button>
        <button class="btn-sm go" id="test300" style="flex:1;">🏆 Goal</button>
      </div>
    </div>

    <div class="note" id="adminNote"></div>
    <div class="adminbar" style="margin-top:6px;">
      <button class="btn-ghost" id="logoutBtn">Lock & Sign Out</button>
    </div>
  </section>

  <footer id="missionFooter"></footer>
</div>

<!-- ======================================================== -->
<!-- CELEBRATION OVERLAY (synced milestone graphics)           -->
<!-- ======================================================== -->
<div class="celebrate" id="celebrate">
  <canvas id="cfx"></canvas>
  <div class="celebrate-card">
    <div class="cel-icon" id="celIcon">🎉</div>
    <div class="cel-head" id="celHead"></div>
    <div class="cel-num" id="celNum"></div>
    <div class="cel-sub" id="celSub"></div>
  </div>
  <button class="cel-close" id="celClose" aria-label="Close">✕</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* ================================================================
   ███  CONFIGURE EVERYTHING HERE  ███
   This is the ONE spot to edit. Read README.md for step-by-step setup.
   ================================================================ */

// ---- 1) FIREBASE CONFIG --------------------------------------
//   Paste the config object Firebase gives you (Project settings →
//   "Your apps" → web app). Make sure databaseURL is included — if it
//   is missing, copy it from Realtime Database (it ends in
//   firebaseio.com or firebasedatabase.app).
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBilE2fh5HvH1tW0JVryOeCn0Y2s_Amjfk",
  authDomain:        "scripture-tracker-b6add.firebaseapp.com",
  databaseURL:       "https://scripture-tracker-b6add-default-rtdb.firebaseio.com",
  projectId:         "scripture-tracker-b6add",
  storageBucket:     "scripture-tracker-b6add.firebasestorage.app",
  messagingSenderId: "959991663555",
  appId:             "1:959991663555:web:85e49ca0927517089d8b76",
  measurementId:     "G-PKSEW3R7X9"
};

// ---- 2) ADMIN PASSWORD ---------------------------------------
//   Unlocks the admin controls on this device. (See the security note
//   in README.md — this hides the controls; it is not bank-grade.)
const ADMIN_PASSWORD = "5898";

// ---- 3) DEFAULTS ---------------------------------------------
const DEFAULT_BOOKLETS_PER_BOX = 300;   // admin can change this live
const APP_TITLE = "Scriptures Completed";

// ---- 3b) WEEK GOAL -------------------------------------------
//   Total Scriptures goal for the week, split evenly across the
//   working days up to (and including) the GOAL day below.
const TOTAL_GOAL = 300000;        // grand total goal for the week
//   Day the goal should be hit (0=Sun … 4=Thu … 5=Fri). Days after
//   this one are shown as "buffer" with no daily goal.
const GOAL_DAY_DOW = 4;           // Thursday night

// ---- 4) MISSION START (the "clock") --------------------------
//   The work-hours clock counts from this exact moment, in Eastern
//   Time (Michigan). Set it to the MONDAY your mission week begins.
//   Format: YEAR, MONTH(1-12), DAY, HOUR(24h), MINUTE
const MISSION_START = { year: 2026, month: 6, day: 15, hour: 9, minute: 0 };

// ---- 4b) CELEBRATIONS ----------------------------------------
//   Milestone graphics that pop up (synced to every device).
const CELEBRATE = {
  smallEvery: 10000,        // small popup each time this many Scriptures is crossed
  halfAt:     150000,       // "halfway there" celebration
  goalAt:     300000,       // "goal reached" finale
  smallMs:    8 * 1000,        // small popup duration  (8 seconds)
  halfMs:     5 * 60 * 1000,   // halfway duration      (5 minutes)
  goalMs:     10 * 60 * 1000   // goal duration         (10 minutes)
};

// ---- 5) WORK WINDOW (rarely needs changing) ------------------
const WORK_START_HOUR = 9;    // 9 AM
const WORK_END_HOUR   = 20;   // 8 PM
//   Working days: Monday(1) … Friday(5)
const WORK_DAYS = [1, 2, 3, 4, 5];
const TIME_ZONE = "America/New_York";

/* ================================================================
   ███  END CONFIG — you shouldn't need to edit below  ███
   ================================================================ */

(() => {
  const parts = APP_TITLE.trim().split(/\s+/);
  document.getElementById("appTitle").innerHTML = parts.length > 1
    ? `<span>${parts[0]}</span> ${parts.slice(1).join(" ")}`
    : APP_TITLE;
})();
document.title = APP_TITLE;

// ---------- Firebase init ----------
let db = null, stateRef = null;
let connected = false;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
  stateRef = db.ref("tracker");
} catch (e) {
  console.error("Firebase init failed:", e);
}

// Local mirror of the shared state
let state = { completedBoxes: 0, bookletsPerBox: DEFAULT_BOOKLETS_PER_BOX, days: {} };

// ---------- DOM ----------
const $ = (id) => document.getElementById(id);
const totalEl   = $("totalCount");
const boxEl     = $("boxCount");
const perHourEl = $("perHour");
const heroSub   = $("heroSub");
const syncDot   = $("syncDot");
const syncText  = $("syncText");

// ---------- Sync status ----------
if (db) {
  db.ref(".info/connected").on("value", (snap) => {
    connected = snap.val() === true;
    syncDot.className = "dot " + (connected ? "live" : "off");
    syncText.textContent = connected ? "Live — synced to all devices" : "Reconnecting…";
  });
} else {
  syncDot.className = "dot off";
  syncText.textContent = "Firebase not configured — see README.md";
}

// ---------- Live data listener (public read) ----------
if (stateRef) {
  stateRef.on("value", (snap) => {
    const v = snap.val() || {};
    state.completedBoxes = Number(v.completedBoxes) || 0;
    state.bookletsPerBox = Number(v.bookletsPerBox) || DEFAULT_BOOKLETS_PER_BOX;
    state.days = v.days || {};
    render();
    handleCelebrate(v.celebrate);
    // keep admin's "per box" field showing the current value when idle
    const pbInput = $("perBoxInput");
    if (document.activeElement !== pbInput) pbInput.value = state.bookletsPerBox;
  }, (err) => {
    console.error("Read failed:", err);
    syncText.textContent = "Read error — check database rules";
    syncDot.className = "dot off";
  });
}

// ---------- Number formatting ----------
const fmt = (n) => Number(n).toLocaleString("en-US");

// ---------- Render dashboard ----------
let lastTotal = null;
function render() {
  const total = state.completedBoxes * state.bookletsPerBox;
  totalEl.textContent = fmt(total);
  boxEl.textContent   = fmt(state.completedBoxes);
  heroSub.textContent = `${fmt(state.completedBoxes)} boxes × ${fmt(state.bookletsPerBox)} booklets`;

  // little "bump" animation when the total changes
  if (lastTotal !== null && total !== lastTotal) {
    totalEl.classList.add("bump");
    setTimeout(() => totalEl.classList.remove("bump"), 180);
  }
  lastTotal = total;

  // overall progress toward the week goal
  const pct = TOTAL_GOAL > 0 ? Math.min(100, (total / TOTAL_GOAL) * 100) : 0;
  $("goalFill").style.width = pct.toFixed(1) + "%";
  $("goalPct").innerHTML =
    `<b>${pct.toFixed(1)}%</b> of ${fmt(TOTAL_GOAL)} goal · ${fmt(Math.max(0, TOTAL_GOAL - total))} to go`;

  renderAvg(total);
  renderDaily();
}

// ================================================================
// AVERAGE-PER-HOUR  (Eastern Time, weekday 9 AM–8 PM only)
// ================================================================

// Returns the current wall-clock time in TIME_ZONE as a plain Date
// whose local fields equal the Eastern-Time fields.
function nowInET() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: TIME_ZONE }));
}

// Build a Date (ET wall clock) from config numbers.
function etDate(y, m, d, h, min) {
  return new Date(y, m - 1, d, h, min, 0, 0);
}

// Sum the number of WORKING hours between two ET datetimes,
// counting only weekday WORK_START_HOUR..WORK_END_HOUR windows.
function workingHoursBetween(start, end) {
  if (end <= start) return 0;
  let total = 0;

  // Walk day by day from the start date through the end date.
  const cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const lastDay = new Date(end.getFullYear(), end.getMonth(), end.getDate());

  while (cur <= lastDay) {
    const dow = cur.getDay(); // 0=Sun … 6=Sat
    if (WORK_DAYS.includes(dow)) {
      const winStart = new Date(cur); winStart.setHours(WORK_START_HOUR, 0, 0, 0);
      const winEnd   = new Date(cur); winEnd.setHours(WORK_END_HOUR, 0, 0, 0);
      // overlap of [start,end] with this day's [winStart,winEnd]
      const a = Math.max(start.getTime(), winStart.getTime());
      const b = Math.min(end.getTime(),   winEnd.getTime());
      if (b > a) total += (b - a) / 3600000; // ms → hours
    }
    cur.setDate(cur.getDate() + 1);
  }
  return total;
}

function renderAvg(total) {
  const start = etDate(MISSION_START.year, MISSION_START.month, MISSION_START.day,
                       MISSION_START.hour, MISSION_START.minute);
  const now = nowInET();
  const hours = workingHoursBetween(start, now);

  if (hours <= 0) {
    perHourEl.textContent = total > 0 ? "—" : "0";
    return;
  }
  const avg = total / hours;
  perHourEl.textContent = Math.round(avg).toLocaleString("en-US");
}

// ================================================================
// DAILY TOTALS  (auto-derived from cumulative day stamps)
// ================================================================
const pad2 = (n) => String(n).padStart(2, "0");

// Today's date key in Eastern Time, as YYYY-MM-DD.
function todayKeyET() {
  // en-CA formats as YYYY-MM-DD
  return new Intl.DateTimeFormat("en-CA", {
    timeZone: TIME_ZONE, year: "numeric", month: "2-digit", day: "2-digit"
  }).format(new Date());
}

// The 5 weekday dates of the mission week, starting at MISSION_START.
function missionWeekDates() {
  const names = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const base = etDate(MISSION_START.year, MISSION_START.month, MISSION_START.day, 0, 0);
  const out = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    out.push({
      key: `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`,
      label: `${names[d.getDay()]} ${d.getMonth() + 1}/${d.getDate()}`,
      isGoal: d.getDay() === GOAL_DAY_DOW
    });
  }
  return out;
}

function renderDaily() {
  const dates = missionWeekDates();
  const days = state.days || {};
  const todayKey = todayKeyET();

  // Per-day goal: split TOTAL_GOAL across the days up to the goal day.
  const goalIdx = dates.findIndex((d) => d.isGoal);
  const goalDays = goalIdx >= 0 ? goalIdx + 1 : dates.length;
  const perDayGoal = Math.round(TOTAL_GOAL / goalDays);

  const html = [];
  let prevCum = 0; // cumulative boxes at the start of each day

  dates.forEach((d, i) => {
    const isToday = d.key === todayKey;
    // Cumulative box count at the END of this day:
    //  - today  -> the LIVE running count (updates as boxes are added)
    //  - a past/future day with a stamp -> that stamp
    //  - otherwise -> carry the prior day's cumulative (no activity)
    let cum;
    if (isToday) cum = state.completedBoxes;
    else if (days[d.key] != null) cum = Number(days[d.key]);
    else cum = prevCum;

    const boxesToday = cum - prevCum;
    prevCum = cum;

    const scriptures = Math.max(0, boxesToday * state.bookletsPerBox);
    const dayGoal = i <= goalIdx ? perDayGoal : 0;
    const sub = dayGoal > 0
      ? `goal ${fmt(dayGoal)} · ${fmt(Math.max(0, boxesToday))} boxes`
      : `buffer · ${fmt(Math.max(0, boxesToday))} boxes`;

    const hitGoal = dayGoal > 0 && scriptures >= dayGoal;
    const tags =
      (d.isGoal ? `<span class="goal">🎯 GOAL</span>` : "") +
      (isToday ? `<span class="live">● today</span>` : "") +
      (hitGoal ? `<span class="met">✓</span>` : "");

    html.push(
      `<div class="daily-row${isToday ? " today" : ""}">
         <div class="day">${d.label}${tags}</div>
         <div class="val">${fmt(scriptures)}<small>${sub}</small></div>
       </div>`
    );
  });

  $("dailyList").innerHTML = html.join("");
  $("dailyFoot").textContent =
    `Daily goal ${fmt(perDayGoal)} Scriptures · ${fmt(TOTAL_GOAL)} total by Thursday night`;
}

// Recompute the average once a minute so it keeps moving even when
// the count is unchanged.
setInterval(() => render(), 60 * 1000);

// Footer: show the configured mission start.
$("missionFooter").textContent =
  `Clock starts ${MISSION_START.month}/${MISSION_START.day}/${MISSION_START.year} ` +
  `${WORK_START_HOUR}:00 ET · counts weekday ${WORK_START_HOUR}:00–${WORK_END_HOUR}:00 ET only`;

// ================================================================
// CELEBRATIONS  (confetti + synced milestone overlay)
// ================================================================
const celEl = $("celebrate");
const celCv = $("cfx");
const celCtx = celCv.getContext("2d");
const CEL_GOLD = ["#d6a93f", "#e6c879", "#f7f2e4", "#ffffff", "#c8902f", "#b8860b"];
let celParts = [], celRAF = null, celHideT = null, celSpawnT = null;
let lastCelAt = 0, localEchoKey = null, localEchoUntil = 0;

function celResize() { celCv.width = window.innerWidth; celCv.height = window.innerHeight; }
window.addEventListener("resize", celResize);
celResize();

function celRand(a, b) { return a + Math.random() * (b - a); }
function celSpawn(n, opts) {
  opts = opts || {};
  const W = celCv.width, H = celCv.height;
  for (let i = 0; i < n; i++) {
    const rainMode = opts.rain;
    celParts.push({
      x: opts.cx != null ? opts.cx : celRand(0, W),
      y: rainMode ? celRand(-50, -6) : (opts.cy != null ? opts.cy : celRand(0, H)),
      vx: opts.burst ? celRand(-6, 6) : celRand(-1.6, 1.6),
      vy: opts.burst ? celRand(-9, -2) : (rainMode ? celRand(2, 5) : celRand(-3, 1)),
      g: 0.14,
      size: celRand(6, 13),
      rot: celRand(0, 6.28), vr: celRand(-0.3, 0.3),
      color: CEL_GOLD[(Math.random() * CEL_GOLD.length) | 0],
      shape: Math.random() < 0.5 ? "r" : "c",
      life: celRand(160, 320)
    });
  }
  if (!celRAF) celLoop();
}
function celBurstAt(cx, cy, n) { celSpawn(n, { burst: true, cx: cx, cy: cy }); }
function celFireworks(times, gap) {
  let k = 0;
  const fire = () => {
    if (k++ >= times || !celEl.classList.contains("show")) return;
    celBurstAt(celRand(60, celCv.width - 60), celRand(80, celCv.height * 0.45), 50);
    celSpawnT = setTimeout(fire, gap);
  };
  fire();
}
function celRainFor(ms, perTick) {
  const start = Date.now();
  const tick = () => {
    if (Date.now() - start > ms || !celEl.classList.contains("show")) return;
    celSpawn(perTick, { rain: true });
    celSpawnT = setTimeout(tick, 280);
  };
  tick();
}
function celLoop() {
  celRAF = requestAnimationFrame(celLoop);
  celCtx.clearRect(0, 0, celCv.width, celCv.height);
  for (let i = celParts.length - 1; i >= 0; i--) {
    const p = celParts[i];
    p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
    if (p.y > celCv.height + 30 || p.life <= 0) { celParts.splice(i, 1); continue; }
    celCtx.save(); celCtx.translate(p.x, p.y); celCtx.rotate(p.rot);
    celCtx.globalAlpha = Math.max(0, Math.min(1, p.life / 50));
    celCtx.fillStyle = p.color;
    if (p.shape === "r") celCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    else { celCtx.beginPath(); celCtx.arc(0, 0, p.size / 2, 0, 6.28); celCtx.fill(); }
    celCtx.restore();
  }
  if (celParts.length === 0 && !celEl.classList.contains("show")) {
    cancelAnimationFrame(celRAF); celRAF = null;
    celCtx.clearRect(0, 0, celCv.width, celCv.height);
  }
}

const CEL_COPY = {
  small: { icon: "🎉", head: "Milestone!",   sub: "Scriptures completed — keep it going!" },
  half:  { icon: "🚩", head: "Halfway there!", sub: "Half the goal reached — keep pressing on!" },
  goal:  { icon: "🏆", head: "Goal reached!",  sub: "Praise God — the goal is complete!" }
};

function celShow(level, value, remainingMs) {
  if (celSpawnT) { clearTimeout(celSpawnT); celSpawnT = null; }
  const c = CEL_COPY[level] || CEL_COPY.small;
  $("celIcon").textContent = c.icon;
  $("celHead").textContent = c.head;
  $("celNum").textContent = Number(value).toLocaleString("en-US");
  $("celSub").textContent = c.sub;
  celEl.classList.add("show");

  // restart the pop animation on the icon
  const ic = $("celIcon"); ic.style.animation = "none"; void ic.offsetWidth; ic.style.animation = "";

  const cx = celCv.width / 2, cy = celCv.height / 2;
  if (level === "goal") { celBurstAt(cx, cy, 160); celRainFor(30000, 12); celFireworks(14, 450); }
  else if (level === "half") { celBurstAt(cx, cy, 110); celRainFor(22000, 9); }
  else { celBurstAt(cx, cy, 70); celRainFor(2500, 8); }

  if (celHideT) clearTimeout(celHideT);
  celHideT = setTimeout(celHide, Math.max(1500, remainingMs));
}
function celHide() {
  celEl.classList.remove("show");
  if (celSpawnT) { clearTimeout(celSpawnT); celSpawnT = null; }
  if (celHideT) { clearTimeout(celHideT); celHideT = null; }
}
$("celClose").addEventListener("click", celHide);

// Admin-only local previews (short auto-close; do NOT broadcast to others).
$("test10k").addEventListener("click", () => celShow("small", 10000, 8000));
$("test150").addEventListener("click", () => celShow("half", 150000, 11000));
$("test300").addEventListener("click", () => celShow("goal", 300000, 13000));

function celDur(level) {
  return level === "goal" ? CELEBRATE.goalMs
       : level === "half" ? CELEBRATE.halfMs
       : CELEBRATE.smallMs;
}

// Show INSTANTLY on the device that triggered the milestone (never depends on
// the network/broadcast succeeding), and remember it so the broadcast echo
// coming back from Firebase doesn't replay it on this same device.
function celShowLocal(level, value) {
  localEchoKey = level + ":" + value;
  localEchoUntil = Date.now() + celDur(level);
  celShow(level, value, celDur(level));
}

// Show a celebration broadcast from Firebase — on every OTHER device, and for
// late-joiners still inside the time window.
function handleCelebrate(c) {
  if (!c || !c.level) return;
  const at = Number(c.at) || 0;
  const dur = celDur(c.level);
  const key = c.level + ":" + c.value;
  // We triggered this one and already showed it locally — ignore the echo.
  if (key === localEchoKey && Date.now() < localEchoUntil) { if (at > lastCelAt) lastCelAt = at; return; }
  if (at && at <= lastCelAt) return;         // not newer than the last we handled
  lastCelAt = at;
  const elapsed = at ? (Date.now() - at) : 0;
  if (elapsed > dur) return;                 // stale (loaded long after) — skip
  celShow(c.level, c.value, dur - Math.max(0, elapsed));
}

// ================================================================
// ADMIN
// ================================================================
const adminToggle = $("adminToggle");
const loginPanel  = $("loginPanel");
const adminPanel  = $("adminPanel");
const adminNote   = $("adminNote");
let isAdmin = false;

adminToggle.addEventListener("click", () => {
  if (isAdmin) {
    adminPanel.classList.toggle("hidden");
    return;
  }
  loginPanel.classList.toggle("hidden");
  if (!loginPanel.classList.contains("hidden")) $("pwInput").focus();
});

function tryUnlock() {
  const val = $("pwInput").value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    loginPanel.classList.add("hidden");
    adminPanel.classList.remove("hidden");
    adminToggle.textContent = "🔓 Admin (unlocked)";
    $("pwErr").textContent = "";
    $("pwInput").value = "";
    $("perBoxInput").value = state.bookletsPerBox;
  } else {
    $("pwErr").textContent = "Wrong password.";
  }
}
$("pwSubmit").addEventListener("click", tryUnlock);
$("pwInput").addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });

$("logoutBtn").addEventListener("click", () => {
  isAdmin = false;
  adminPanel.classList.add("hidden");
  adminToggle.textContent = "🔒 Admin";
});

// ---- Write helpers (guarded) ----
function requireReady() {
  if (!isAdmin) { flash("Unlock admin first."); return false; }
  if (!stateRef || !connected) { flash("Not connected to the database."); return false; }
  return true;
}
function flash(msg, ok) {
  adminNote.textContent = msg;
  adminNote.style.color = ok ? "var(--ok)" : "var(--danger)";
  if (ok) setTimeout(() => { adminNote.textContent = ""; }, 2500);
}

function writeBoxes(newCount) {
  newCount = Math.max(0, Math.floor(newCount));
  const per = state.bookletsPerBox;
  const oldTotal = state.completedBoxes * per;
  const newTotal = newCount * per;
  const milestone = detectMilestone(oldTotal, newTotal);

  stateRef.update({ completedBoxes: newCount, bookletsPerBox: state.bookletsPerBox })
    .then(() => {
      flash("Saved ✓ — everyone's screen just updated.", true);
      // Best-effort: stamp today's cumulative count for the daily breakdown.
      // If this is rejected (rules not updated yet) the core count still saved,
      // but we WARN so the daily history isn't silently lost.
      stateRef.child("days").child(todayKeyET()).set(newCount)
        .catch(() => flash("⚠ Count saved, but daily history is NOT saving — publish the updated database rules (see README).", false));

      // Milestone! Show it on THIS screen instantly (never depends on the
      // network), then broadcast it to every other device.
      if (milestone) {
        celShowLocal(milestone.level, milestone.value);
        stateRef.child("celebrate").set({
          level: milestone.level,
          value: milestone.value,
          at: firebase.database.ServerValue.TIMESTAMP
        }).catch(() => flash("⚠ Celebration showed here, but did NOT broadcast to other devices — publish the updated rules (celebrate node).", false));
      }
    })
    .catch((e) => flash("Save failed: " + e.message));
}

// Which milestone (if any) did we just cross going up?
function detectMilestone(oldTotal, newTotal) {
  if (newTotal <= oldTotal) return null;
  if (oldTotal < CELEBRATE.goalAt && newTotal >= CELEBRATE.goalAt) return { level: "goal", value: CELEBRATE.goalAt };
  if (oldTotal < CELEBRATE.halfAt && newTotal >= CELEBRATE.halfAt) return { level: "half", value: CELEBRATE.halfAt };
  const oldM = Math.floor(oldTotal / CELEBRATE.smallEvery);
  const newM = Math.floor(newTotal / CELEBRATE.smallEvery);
  if (newM > oldM) return { level: "small", value: newM * CELEBRATE.smallEvery };
  return null;
}

// +1 box
$("plusBox").addEventListener("click", () => {
  if (!requireReady()) return;
  writeBoxes(state.completedBoxes + 1);
});

// remove 1 box
$("minusBox").addEventListener("click", () => {
  if (!requireReady()) return;
  writeBoxes(state.completedBoxes - 1);
});

// add N boxes
$("addBoxesBtn").addEventListener("click", () => {
  if (!requireReady()) return;
  const n = parseInt($("addBoxesInput").value, 10);
  if (isNaN(n)) { flash("Enter a number to add."); return; }
  writeBoxes(state.completedBoxes + n);
  $("addBoxesInput").value = "";
});

// set exact box count
$("setBoxesBtn").addEventListener("click", () => {
  if (!requireReady()) return;
  const n = parseInt($("setBoxesInput").value, 10);
  if (isNaN(n)) { flash("Enter the exact box count."); return; }
  writeBoxes(n);
  $("setBoxesInput").value = "";
});

// set booklets-per-box
$("perBoxBtn").addEventListener("click", () => {
  if (!requireReady()) return;
  const n = parseInt($("perBoxInput").value, 10);
  if (isNaN(n) || n < 1) { flash("Booklets per box must be 1 or more."); return; }
  stateRef.update({ bookletsPerBox: n, completedBoxes: state.completedBoxes })
    .then(() => flash("Booklets-per-box saved ✓", true))
    .catch((e) => flash("Save failed: " + e.message));
});
