<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b1d3a" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Scriptures Completed</title>

<style>
  /* ============================================================
     COLORS / THEME
     ============================================================ */
  :root{
    --bg:#081730;          /* deep navy */
    --bg2:#0e2347;
    --card:rgba(255,255,255,0.05);
    --border:rgba(214,169,63,0.22);  /* warm gold-tinted edges */
    --text:#f7f2e4;        /* cream */
    --muted:#a9b6cf;       /* soft slate */
    --accent:#d6a93f;      /* rich gold */
    --accent2:#e6c879;     /* soft gold */
    --danger:#e0796b;
    --ok:#7fc8a0;          /* green kept only for the live-sync dot */
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg),var(--bg2));
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:560px; margin:0 auto; padding:18px 16px 48px;}

  header.app{
    text-align:center;
    padding:18px 8px 8px;
  }
  header.app h1{
    margin:0;
    font-size:1.3rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--text);
    font-weight:800;
  }
  header.app h1 span{color:var(--accent);}
  .sync{
    margin-top:6px;
    font-size:.78rem;
    color:var(--muted);
    display:inline-flex; align-items:center; gap:7px;
  }
  .dot{width:9px;height:9px;border-radius:50%;background:#777;display:inline-block;transition:background .3s;}
  .dot.live{background:var(--ok); box-shadow:0 0 10px var(--ok);}
  .dot.off{background:var(--danger);}

  /* ============================================================
     HERO COUNT
     ============================================================ */
  .hero{
    margin:22px 0 14px;
    text-align:center;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:24px;
    padding:30px 16px 26px;
    box-shadow:0 12px 40px rgba(0,0,0,.30);
  }
  .hero .label{
    font-size:.82rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); font-weight:700;
  }
  .hero .total{
    /* Starting (max) size; fitTotal() shrinks this in JS so the number
       never overflows the card, no matter how many digits it grows to. */
    font-size:clamp(2.4rem, 15vw, 4.6rem);
    line-height:1.04;
    font-weight:900;
    color:var(--accent);
    margin:8px 0 4px;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;            /* keep the number on one line so it can be measured/scaled */
    text-shadow:0 4px 26px rgba(214,169,63,.32);
    transition:transform .18s ease;
  }
  .hero .total.bump{transform:scale(1.06);}
  .hero .sub{font-size:.95rem; color:var(--muted);}
  .goalbar{
    margin:18px auto 4px; max-width:340px; height:10px; border-radius:6px;
    background:rgba(255,255,255,0.08); overflow:hidden;
  }
  .goalbar-fill{
    height:100%; width:0%; border-radius:6px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .5s ease;
  }
  .goalpct{font-size:.8rem; color:var(--muted); margin-top:8px;}
  .goalpct b{color:var(--accent);}
  .pace{
    display:inline-block; margin-top:12px; font-size:.82rem; font-weight:700;
    padding:6px 14px; border-radius:20px; letter-spacing:.02em;
  }
  .pace:empty{display:none;}
  .pace.ahead{background:rgba(127,200,160,.16); color:#9fe0c0; border:1px solid rgba(127,200,160,.45);}
  .pace.behind{background:rgba(224,121,107,.15); color:#f0a99c; border:1px solid rgba(224,121,107,.45);}
  .pace.done{background:rgba(214,169,63,.18); color:var(--accent); border:1px solid rgba(214,169,63,.5);}
  .proj{font-size:.78rem; color:var(--muted); margin-top:10px;}
  .proj b{color:var(--text);}

  /* ============================================================
     STAT CARDS
     ============================================================ */
  .stats{
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px;
  }
  .stat{
    background:var(--card); border:1px solid var(--border);
    border-radius:18px; padding:18px 14px; text-align:center;
  }
  .stat .num{font-size:2rem; font-weight:800; font-variant-numeric:tabular-nums;}
  .stat .num.green{color:var(--accent2);}
  .stat .cap{font-size:.74rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-top:5px;}

  /* ============================================================
     DAILY TOTALS
     ============================================================ */
  .daily{
    margin-top:14px; background:var(--card); border:1px solid var(--border);
    border-radius:18px; padding:16px 16px 14px;
  }
  .daily-title{
    font-size:.74rem; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); font-weight:700; text-align:center; margin-bottom:10px;
  }
  .daily-row{
    padding:11px 12px; border-radius:12px; margin-bottom:6px;
    background:rgba(255,255,255,0.03); border:1px solid transparent;
  }
  .daily-row:last-child{margin-bottom:0;}
  .daily-row.today{
    border-color:var(--accent); background:rgba(214,169,63,0.10);
  }
  .daily-main{display:flex; align-items:center; justify-content:space-between;}
  .day-bar{margin-top:10px; height:9px; border-radius:6px; background:rgba(255,255,255,.08); overflow:hidden;}
  .day-bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .5s ease;}
  .day-bar-cap{font-size:.7rem; color:var(--muted); margin-top:6px; text-align:right;}
  .day-bar-cap b{color:var(--accent);}
  .daily-row .day{font-weight:700; font-size:1rem; display:flex; align-items:center; gap:8px;}
  .daily-row .day .goal{font-size:.68rem; color:var(--accent); letter-spacing:.05em;}
  .daily-row .day .live{font-size:.62rem; color:var(--ok); letter-spacing:.08em; text-transform:uppercase;}
  .daily-row .day .met{font-size:.85rem; color:var(--ok); font-weight:800;}
  .daily-row .day .miss{font-size:.95rem; line-height:1;}
  .daily-row .val{font-weight:800; font-size:1.15rem; color:var(--accent); font-variant-numeric:tabular-nums;}
  .daily-row .val small{font-size:.68rem; color:var(--muted); font-weight:600; display:block; text-align:right;}
  .daily-foot{font-size:.72rem; color:var(--muted); text-align:center; margin-top:10px; line-height:1.5;}

  /* ============================================================
     BUTTONS / ADMIN
     ============================================================ */
  .adminbar{margin-top:26px; text-align:center;}
  button{
    font-family:inherit; cursor:pointer; border:none; border-radius:14px;
    font-weight:700; transition:transform .08s ease, opacity .2s, background .2s;
  }
  button:active{transform:scale(.97);}
  button:disabled{opacity:.5; cursor:not-allowed;}

  .btn-ghost{
    background:transparent; color:var(--muted); border:1px solid var(--border);
    padding:12px 20px; font-size:.9rem; letter-spacing:.05em;
  }

  .admin{
    margin-top:18px;
    background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:18px 16px 22px;
  }
  .admin h2{
    margin:0 0 14px; font-size:.9rem; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); text-align:center;
  }

  .btn-plus{
    width:100%; background:var(--accent); color:#0a1730;
    font-size:1.7rem; padding:26px 10px; border-radius:18px; letter-spacing:.02em;
    box-shadow:0 8px 24px rgba(214,169,63,.38);
  }

  .row{display:flex; gap:10px; margin-top:14px; align-items:stretch;}
  .row input{
    flex:1; min-width:0; background:rgba(0,0,0,.25); color:var(--text);
    border:1px solid var(--border); border-radius:12px; padding:14px;
    font-size:1.1rem; font-family:inherit; text-align:center;
  }
  .row input:focus{outline:none; border-color:var(--accent);}
  .btn-sm{padding:0 18px; font-size:1rem; background:#27406e; color:var(--text); border:1px solid var(--border);}
  .btn-sm.danger{background:transparent; color:var(--danger); border:1px solid rgba(255,107,107,.5);}
  .btn-sm.go{background:var(--accent); color:#3a2c00;}

  .field{margin-top:16px;}
  .field label{display:block; font-size:.78rem; color:var(--muted); margin-bottom:6px; letter-spacing:.05em;}

  .note{font-size:.74rem; color:var(--muted); text-align:center; margin-top:16px; line-height:1.5;}

  /* login box */
  .login{margin-top:18px; text-align:center;}
  .login input{
    width:100%; background:rgba(0,0,0,.25); color:var(--text);
    border:1px solid var(--border); border-radius:12px; padding:14px;
    font-size:1.1rem; font-family:inherit; text-align:center; letter-spacing:.2em;
  }
  .login input:focus{outline:none; border-color:var(--accent);}
  .login .btn-go{margin-top:12px; width:100%; background:var(--accent); color:#3a2c00; padding:16px; font-size:1.05rem;}
  .err{color:var(--danger); font-size:.85rem; margin-top:10px; min-height:1em;}

  /* ============================================================
     CELEBRATIONS
     ============================================================ */
  .celebrate{
    position:fixed; inset:0; z-index:1000;
    display:flex; align-items:center; justify-content:center;
    background:rgba(4,12,28,.82);
    opacity:0; pointer-events:none; transition:opacity .4s ease;
  }
  .celebrate.show{opacity:1; pointer-events:auto;}
  #cfx{position:fixed; inset:0; z-index:1001; pointer-events:none;}
  .celebrate-card{position:relative; z-index:1002; text-align:center; padding:0 26px; max-width:520px;}
  .cel-icon{font-size:72px; line-height:1; animation:celpop .6s cubic-bezier(.2,1.3,.4,1);}
  .cel-head{
    margin-top:12px; font-weight:900; color:var(--accent);
    text-transform:uppercase; letter-spacing:.02em;
    font-size:clamp(2rem,9vw,3.2rem); line-height:1.05;
  }
  .cel-num{
    margin-top:4px; font-weight:900; color:var(--text);
    font-size:clamp(2.6rem,13vw,4.2rem); font-variant-numeric:tabular-nums;
    text-shadow:0 4px 30px rgba(214,169,63,.45);
  }
  .cel-sub{margin-top:14px; font-size:1.05rem; color:#cdd6e8; line-height:1.5;}
  .cel-close{
    position:fixed; top:16px; right:16px; z-index:1003;
    width:46px; height:46px; border-radius:50%; border:none;
    background:rgba(255,255,255,.15); color:var(--text); font-size:22px; cursor:pointer;
  }
  @keyframes celpop{0%{transform:scale(0) rotate(-18deg);}100%{transform:scale(1) rotate(0);}}

  /* ============================================================
     WEEK SUMMARY (shown after the 300k celebration, stays up)
     ============================================================ */
  .summary{
    position:fixed; inset:0; z-index:1100;
    background:linear-gradient(160deg,#081730,#0e2347);
    display:flex; align-items:flex-start; justify-content:center;
    overflow-y:auto; padding:32px 18px;
  }
  .summary-inner{max-width:460px; width:100%; text-align:center; color:var(--text);}
  .summary-badge{font-size:60px; line-height:1; animation:celpop .6s cubic-bezier(.2,1.3,.4,1);}
  .summary-inner h2{
    font-size:1.35rem; color:var(--accent); text-transform:uppercase;
    letter-spacing:.04em; margin:6px 0 18px; font-weight:900;
  }
  .summary-total{
    font-size:clamp(3rem,16vw,4.6rem); font-weight:900; color:var(--accent);
    line-height:1; font-variant-numeric:tabular-nums; text-shadow:0 4px 26px rgba(214,169,63,.35);
  }
  .summary-label{font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-top:6px;}
  .summary-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:22px 0;}
  .summary-stats > div{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 6px;}
  .summary-stats .sv{font-size:1.5rem; font-weight:800; color:var(--accent2); font-variant-numeric:tabular-nums;}
  .summary-stats .sc{font-size:.64rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-top:4px;}
  .summary-daily{text-align:left; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:6px 14px; margin-bottom:20px;}
  .sum-row{display:flex; justify-content:space-between; align-items:center; padding:11px 2px; border-bottom:1px solid rgba(255,255,255,.07); font-size:1rem;}
  .sum-row:last-child{border-bottom:none;}
  .sum-row .met{color:var(--ok); font-weight:800; margin-left:5px;}
  .sum-row b{color:var(--accent); font-variant-numeric:tabular-nums;}
  .summary-close{background:transparent; color:var(--muted); border:1px solid var(--border); padding:12px 26px; font-size:.9rem; border-radius:12px; letter-spacing:.04em;}

  /* ============================================================
     PRESENT MODE (projector-friendly)
     ============================================================ */
  .btn-present{
    width:100%; background:#27406e; color:var(--text); border:1px solid var(--border);
    padding:16px 10px; font-size:1.05rem; border-radius:14px; margin-bottom:16px;
  }
  .exit-present{
    display:none; position:fixed; top:16px; right:16px; z-index:1200;
    background:rgba(255,255,255,.14); color:var(--text); border:1px solid var(--border);
    padding:10px 16px; font-size:.9rem; border-radius:12px; cursor:pointer;
  }
  body.present .exit-present{display:block;}

  /* Hide controls/chrome on the projector */
  body.present .adminbar,
  body.present #adminPanel,
  body.present #loginPanel,
  body.present #missionFooter,
  body.present header.app .sync{ display:none !important; }

  /* Fill the whole screen for projector / TV viewing. Sizes are
     viewport-relative (vw/vh/clamp) so the layout scales from a phone
     up to a 4K wall display, with no fixed max-width leaving dead borders.
     (No !important on .total so fitTotal() can still shrink it to fit.) */
  body.present{overflow:hidden;}
  body.present .wrap{
    max-width:none; width:100vw; min-height:100vh;
    margin:0; padding:3.2vh 3vw;
    display:flex; flex-direction:column; justify-content:center; gap:2.4vh;
  }
  body.present header.app{padding:0;}
  body.present header.app h1{font-size:clamp(1.6rem, 3vw, 4.5rem); letter-spacing:.14em;}

  body.present .hero{
    margin:0; padding:clamp(20px,3vh,52px) clamp(20px,3vw,64px); border-radius:28px;
  }
  body.present .hero .label{font-size:clamp(1rem, 1.7vw, 2.4rem);}
  body.present .hero .total{font-size:clamp(4rem, 15vw, 26rem); line-height:1.0;}
  body.present .hero .sub{font-size:clamp(1.1rem, 1.8vw, 2.6rem);}
  body.present .goalbar{max-width:min(60vw,760px); height:clamp(12px,1.4vh,24px);}
  body.present .goalpct{font-size:clamp(1rem,1.5vw,2.1rem);}
  body.present .pace{font-size:clamp(1.1rem,1.8vw,2.4rem); padding:10px 24px; margin-top:1.6vh;}
  body.present .proj{font-size:clamp(1rem,1.5vw,2.1rem); margin-top:1vh;}

  body.present .stats{gap:2vw; margin:0;}
  body.present .stat{padding:clamp(16px,2.4vh,44px) clamp(14px,2vw,44px); border-radius:22px;}
  body.present .stat .num{font-size:clamp(2.4rem, 5vw, 8rem);}
  body.present .stat .cap{font-size:clamp(.85rem,1.2vw,1.7rem);}

  body.present .daily{margin:0; padding:clamp(16px,2vh,36px) clamp(16px,2vw,40px); border-radius:22px;}
  body.present .daily-title{font-size:clamp(1rem,1.5vw,2.1rem);}
  body.present .daily-row{padding:clamp(10px,1.4vh,22px) clamp(12px,1.4vw,26px);}
  body.present .daily-row .day{font-size:clamp(1.2rem,1.8vw,2.8rem); gap:clamp(8px,.9vw,16px);}
  /* Status icons next to each date — scaled up so the check mark, sad face,
     etc. read clearly from across a room (larger than the date text itself). */
  body.present .daily-row .day .met{font-size:clamp(1.7rem,2.7vw,4.2rem);}
  body.present .daily-row .day .miss{font-size:clamp(1.7rem,2.7vw,4.2rem);}
  body.present .daily-row .day .goal{font-size:clamp(.95rem,1.4vw,2rem);}
  body.present .daily-row .day .live{font-size:clamp(.9rem,1.25vw,1.8rem);}
  body.present .daily-row .val{font-size:clamp(1.3rem,2vw,3.1rem);}
  body.present .daily-row .val small{font-size:clamp(.8rem,1.1vw,1.5rem);}
  body.present .day-bar{height:clamp(8px,1.1vh,18px);}
  body.present .day-bar-cap{font-size:clamp(.8rem,1.1vw,1.5rem);}
  body.present .daily-foot{font-size:clamp(.8rem,1.1vw,1.6rem);}

  /* Landscape TVs / monitors: two columns that fill the full width & height,
     so the hero, stats and daily breakdown reach close to every edge. */
  @media (orientation:landscape) and (min-width:1000px){
    body.present .wrap{
      display:grid; height:100vh;
      grid-template-columns:1.05fr .95fr;
      grid-template-rows:auto auto 1fr;
      grid-template-areas:
        "header header"
        "hero   daily"
        "stats  daily";
      align-content:stretch; column-gap:3vw; row-gap:2.2vh;
    }
    body.present header.app{grid-area:header; align-self:center;}
    body.present .hero{grid-area:hero; display:flex; flex-direction:column; justify-content:center;}
    body.present .hero .total{font-size:clamp(5rem, 11vw, 24rem);}
    body.present .stats{grid-area:stats; align-content:center;}
    body.present .daily{grid-area:daily; overflow:auto; display:flex; flex-direction:column;}
    body.present .daily #dailyList{flex:1;}
  }

  .hidden{display:none !important;}

  footer{margin-top:30px; text-align:center; font-size:.72rem; color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <!-- ======================================================== -->
  <!-- HEADER                                                    -->
  <!-- ======================================================== -->
  <header class="app">
    <h1 id="appTitle">Scriptures Completed</h1>
    <div class="sync"><span class="dot" id="syncDot"></span><span id="syncText">Connecting…</span></div>
  </header>

  <!-- ======================================================== -->
  <!-- PUBLIC DASHBOARD                                          -->
  <!-- ======================================================== -->
  <section class="hero">
    <div class="label">Total Scriptures Completed</div>
    <div class="total" id="totalCount">—</div>
    <div class="sub" id="heroSub">&nbsp;</div>
    <div class="goalbar"><div class="goalbar-fill" id="goalFill"></div></div>
    <div class="goalpct" id="goalPct">&nbsp;</div>
    <div class="pace" id="paceBadge"></div>
    <div class="proj" id="projFinish">&nbsp;</div>
  </section>

  <div class="stats">
    <div class="stat">
      <div class="num" id="boxCount">—</div>
      <div class="cap">Boxes Completed</div>
    </div>
    <div class="stat">
      <div class="num green" id="perHour">—</div>
      <div class="cap">Average / Hour</div>
    </div>
  </div>

  <!-- DAILY TOTALS (auto-populated) -->
  <section class="daily">
    <div class="daily-title">Daily Totals</div>
    <div id="dailyList"></div>
    <div class="daily-foot" id="dailyFoot"></div>
  </section>

  <!-- ======================================================== -->
  <!-- ADMIN TOGGLE                                              -->
  <!-- ======================================================== -->
  <div class="adminbar">
    <button class="btn-ghost" id="adminToggle">🔒 Admin</button>
  </div>

  <!-- LOGIN (hidden until toggled) -->
  <section class="admin login hidden" id="loginPanel">
    <h2>Admin Login</h2>
    <input type="password" id="pwInput" inputmode="numeric" placeholder="Password" autocomplete="off" />
    <button class="btn-go" id="pwSubmit">Unlock</button>
    <div class="err" id="pwErr"></div>
  </section>

  <!-- ADMIN CONTROLS (hidden until unlocked) -->
  <section class="admin hidden" id="adminPanel">
    <h2>Admin Controls</h2>

    <button class="btn-present" id="presentBtn">🖥 Present mode (for projector)</button>

    <button class="btn-plus" id="plusBox">+1 Box</button>

    <div class="field">
      <label>Add a specific number of boxes</label>
      <div class="row">
        <input type="number" id="addBoxesInput" inputmode="numeric" placeholder="e.g. 5" />
        <button class="btn-sm go" id="addBoxesBtn">Add</button>
      </div>
    </div>

    <div class="field">
      <label>Set total completed boxes (overwrite)</label>
      <div class="row">
        <input type="number" id="setBoxesInput" inputmode="numeric" placeholder="exact box count" />
        <button class="btn-sm" id="setBoxesBtn">Set</button>
      </div>
    </div>

    <div class="field">
      <label>Correct a mistake</label>
      <div class="row">
        <button class="btn-sm danger" id="minusBox" style="flex:1;">− Remove 1 Box</button>
      </div>
    </div>

    <div class="field">
      <label>Booklets per box</label>
      <div class="row">
        <input type="number" id="perBoxInput" inputmode="numeric" placeholder="booklets per box" />
        <button class="btn-sm go" id="perBoxBtn">Save</button>
      </div>
    </div>

    <div class="field">
      <label>Preview celebrations (this device only — not broadcast)</label>
      <div class="row">
        <button class="btn-sm" id="test10k" style="flex:1;">🎉 10k</button>
        <button class="btn-sm" id="test150" style="flex:1;">🚩 Halfway</button>
        <button class="btn-sm go" id="test300" style="flex:1;">🏆 Goal</button>
      </div>
    </div>

    <div class="field">
      <label>Fire celebration on ALL devices (does not change the count)</label>
      <div class="row">
        <button class="btn-sm go" id="fire150" style="flex:1;">🚩 150k</button>

  const avail = card.clientWidth
    - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight) - 6;
  if (avail <= 0) return;
  const natural = el.scrollWidth;         // full width (white-space:nowrap)
  if (natural > avail) {

    el.style.fontSize = (base * avail / natural) + "px";

// ================================================================
// AVERAGE-PER-HOUR  (Eastern Time, weekday 9 AM–8 PM only)
// ================================================================

// Returns the current wall-clock time in TIME_ZONE as a plain Date
// whose local fields equal the Eastern-Time fields.
function nowInET() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: TIME_ZONE }));
}

// Build a Date (ET wall clock) from config numbers.
function etDate(y, m, d, h, min) {
  return new Date(y, m - 1, d, h, min, 0, 0);
}

// Sum the number of WORKING hours between two ET datetimes,
// counting only weekday WORK_START_HOUR..WORK_END_HOUR windows.
function workingHoursBetween(start, end) {
  if (end <= start) return 0;
  let total = 0;

  // Walk day by day from the start date through the end date.
  const cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const lastDay = new Date(end.getFullYear(), end.getMonth(), end.getDate());

  while (cur <= lastDay) {
    const dow = cur.getDay(); // 0=Sun … 6=Sat
    if (WORK_DAYS.includes(dow)) {
      const winStart = new Date(cur); winStart.setHours(WORK_START_HOUR, 0, 0, 0);
      const winEnd   = new Date(cur); winEnd.setHours(WORK_END_HOUR, 0, 0, 0);
      // overlap of [start,end] with this day's [winStart,winEnd]
      const a = Math.max(start.getTime(), winStart.getTime());
      const b = Math.min(end.getTime(),   winEnd.getTime());
      if (b > a) total += (b - a) / 3600000; // ms → hours
    }
    cur.setDate(cur.getDate() + 1);
  }
  return total;
}

// The goal deadline: the goal day (Thursday) at the end of the work window.
function goalDeadline() {
  const dates = missionWeekDates();
  const g = dates.find((d) => d.isGoal) || dates[dates.length - 1];
  const p = g.key.split("-").map(Number);
  return etDate(p[0], p[1], p[2], WORK_END_HOUR, 0);
}

// Add N working hours to a start time, skipping nights/weekends — used to
// project when the goal will be reached at the current pace.
function addWorkingHours(start, hoursToAdd) {
  if (hoursToAdd <= 0) return new Date(start);
  let remaining = hoursToAdd * 3600000;
  let cur = new Date(start);
  for (let guard = 0; guard < 400 && remaining > 0; guard++) {
    if (WORK_DAYS.includes(cur.getDay())) {
      const winStart = new Date(cur); winStart.setHours(WORK_START_HOUR, 0, 0, 0);
      const winEnd   = new Date(cur); winEnd.setHours(WORK_END_HOUR, 0, 0, 0);
      const segStart = cur < winStart ? winStart : cur;
      if (segStart < winEnd) {
        const avail = winEnd - segStart;
        if (remaining <= avail) return new Date(segStart.getTime() + remaining);
        remaining -= avail;
      }
    }
    cur.setDate(cur.getDate() + 1);
    cur.setHours(WORK_START_HOUR, 0, 0, 0);
  }
  return cur;
}

function fmtDateTime(d) {
  const names = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  let h = d.getHours(); const ap = h >= 12 ? "PM" : "AM"; let hh = h % 12; if (hh === 0) hh = 12;
  return `${names[d.getDay()]} ${hh}:${pad2(d.getMinutes())} ${ap}`;
}

function renderAvgPaceProjection(total) {
  const start = etDate(MISSION_START.year, MISSION_START.month, MISSION_START.day,
                       MISSION_START.hour, MISSION_START.minute);
  const now = nowInET();
  const elapsed = workingHoursBetween(start, now);
  const avgPerHour = elapsed > 0 ? total / elapsed : 0;

  // Average / hour
  perHourEl.textContent = elapsed > 0
    ? Math.round(avgPerHour).toLocaleString("en-US")
    : (total > 0 ? "—" : "0");

  // On-pace badge: compare actual vs. the straight-line pace needed to hit
  // TOTAL_GOAL by the deadline.
  const paceEl = $("paceBadge");
  const totalHrs = workingHoursBetween(start, goalDeadline());
  if (total >= TOTAL_GOAL) {
    paceEl.className = "pace done"; paceEl.textContent = "🎉 Goal reached!";
  } else if (totalHrs > 0) {
    const expected = TOTAL_GOAL * Math.min(1, elapsed / totalHrs);
    const diff = Math.round(total - expected);
    if (diff >= 0) { paceEl.className = "pace ahead";  paceEl.textContent = "● On pace — ahead by " + fmt(diff); }
    else           { paceEl.className = "pace behind"; paceEl.textContent = "● Behind by " + fmt(-diff); }
  } else {
    paceEl.className = "pace"; paceEl.textContent = "";
  }

  // Projected finish at current pace
  const projEl = $("projFinish");
  if (total >= TOTAL_GOAL) {
    projEl.innerHTML = "<b>" + fmt(TOTAL_GOAL) + " complete</b> 🙌";
  } else if (avgPerHour > 0) {
    const finish = addWorkingHours(now, (TOTAL_GOAL - total) / avgPerHour);
    projEl.innerHTML = "At this pace, <b>" + fmt(TOTAL_GOAL) + " by " + fmtDateTime(finish) + "</b>";
  } else {
    projEl.textContent = "Projected finish: —";
  }
}

// ================================================================
// DAILY TOTALS  (auto-derived from cumulative day stamps)
// ================================================================
const pad2 = (n) => String(n).padStart(2, "0");

// Today's date key in Eastern Time, as YYYY-MM-DD.
function todayKeyET() {
  // en-CA formats as YYYY-MM-DD
  return new Intl.DateTimeFormat("en-CA", {
    timeZone: TIME_ZONE, year: "numeric", month: "2-digit", day: "2-digit"
  }).format(new Date());
}

// The 5 weekday dates of the mission week, starting at MISSION_START.
function missionWeekDates() {
  const names = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  const base = etDate(MISSION_START.year, MISSION_START.month, MISSION_START.day, 0, 0);
  const out = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    out.push({
      key: `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`,
      label: `${names[d.getDay()]} ${d.getMonth() + 1}/${d.getDate()}`,
      isGoal: d.getDay() === GOAL_DAY_DOW
    });
  }
  return out;
}

// Compute each mission-week day's production, goal, and met/missed status.
function computeDailyRows() {
  const dates = missionWeekDates();
  const days = state.days || {};
  const todayKey = todayKeyET();

  // Per-day goal: split TOTAL_GOAL across the days up to the goal day.
  const goalIdx = dates.findIndex((d) => d.isGoal);
  const goalDays = goalIdx >= 0 ? goalIdx + 1 : dates.length;
  const perDayGoal = Math.round(TOTAL_GOAL / goalDays);

  let prevCum = 0; // cumulative boxes at the start of each day
  const rows = dates.map((d, i) => {
    const isToday = d.key === todayKey;
    // Cumulative box count at the END of this day:
    //  - today  -> the LIVE running count (updates as boxes are added)
    //  - a past/future day with a stamp -> that stamp
    //  - otherwise -> carry the prior day's cumulative (no activity)
    let cum;
    if (isToday) cum = state.completedBoxes;
    else if (days[d.key] != null) cum = Number(days[d.key]);
    else cum = prevCum;

    const boxesToday = Math.max(0, cum - prevCum);
    prevCum = cum;

    const scriptures = boxesToday * state.bookletsPerBox;
    const dayGoal = i <= goalIdx ? perDayGoal : 0;
    const isPast = d.key < todayKey;   // a fully-finished day
    const met = dayGoal > 0 && scriptures >= dayGoal;
    const missed = dayGoal > 0 && isPast && scriptures < dayGoal;

    return Object.assign({}, d, { scriptures, boxes: boxesToday, dayGoal, isToday, isPast, met, missed });
  });

  return { rows, perDayGoal, goalDays };
}

function renderDaily() {
  const { rows, perDayGoal } = computeDailyRows();
  const html = rows.map((d) => {
    const sub = d.dayGoal > 0
      ? `goal ${fmt(d.dayGoal)} · ${fmt(d.boxes)} boxes`
      : `buffer · ${fmt(d.boxes)} boxes`;
    const tags =
      (d.isGoal ? `<span class="goal">🎯 GOAL</span>` : "") +
      (d.isToday ? `<span class="live">● today</span>` : "") +
      (d.met ? `<span class="met">✓</span>` : "") +
      (d.missed ? `<span class="miss">😞</span>` : "");

    // Progress bar — TODAY ONLY, toward today's individual goal.
    let bar = "";
    if (d.isToday && d.dayGoal > 0) {
      const pct = Math.min(100, Math.round((d.scriptures / d.dayGoal) * 100));
      bar = `<div class="day-bar"><div class="day-bar-fill" style="width:${pct}%"></div></div>
             <div class="day-bar-cap"><b>${pct}%</b> of today's ${fmt(d.dayGoal)} goal</div>`;
    }

    return `<div class="daily-row${d.isToday ? " today" : ""}">
         <div class="daily-main">
           <div class="day">${d.label}${tags}</div>
           <div class="val">${fmt(d.scriptures)}<small>${sub}</small></div>
         </div>
         ${bar}
       </div>`;
  }).join("");

  $("dailyList").innerHTML = html;
  $("dailyFoot").textContent =
    `Daily goal ${fmt(perDayGoal)} Scriptures · ${fmt(TOTAL_GOAL)} total by Thursday night`;
}

// Recompute the average once a minute so it keeps moving even when
// the count is unchanged.
setInterval(() => render(), 60 * 1000);

// Footer: show the configured mission start.
$("missionFooter").textContent =
  `Clock starts ${MISSION_START.month}/${MISSION_START.day}/${MISSION_START.year} ` +
  `${WORK_START_HOUR}:00 ET · counts weekday ${WORK_START_HOUR}:00–${WORK_END_HOUR}:00 ET only · ${APP_VERSION}`;

// ================================================================
// CELEBRATIONS  (confetti + synced milestone overlay)
// ================================================================
const celEl = $("celebrate");
const celCv = $("cfx");
const celCtx = celCv.getContext("2d");
const CEL_GOLD = ["#d6a93f", "#e6c879", "#f7f2e4", "#ffffff", "#c8902f", "#b8860b"];
let celParts = [], celRAF = null, celHideT = null, celRainT = null, celFwT = null;
let celCurrentLevel = null, prevTotal = null, prevPerBox = null;
const shownKeys = {};   // milestone "level:value" -> expiry ms (dedupe detect + broadcast)

function celResize() { celCv.width = window.innerWidth; celCv.height = window.innerHeight; }
window.addEventListener("resize", celResize);
celResize();

function celRand(a, b) { return a + Math.random() * (b - a); }
function celSpawn(n, opts) {
  opts = opts || {};
  const W = celCv.width, H = celCv.height;
  for (let i = 0; i < n; i++) {
    const rainMode = opts.rain;
    celParts.push({
      x: opts.cx != null ? opts.cx : celRand(0, W),
      y: rainMode ? celRand(-50, -6) : (opts.cy != null ? opts.cy : celRand(0, H)),
      vx: opts.burst ? celRand(-6, 6) : celRand(-1.6, 1.6),
      vy: opts.burst ? celRand(-9, -2) : (rainMode ? celRand(2, 5) : celRand(-3, 1)),
      g: 0.14,
      size: celRand(6, 13),
      rot: celRand(0, 6.28), vr: celRand(-0.3, 0.3),
      color: CEL_GOLD[(Math.random() * CEL_GOLD.length) | 0],
      shape: Math.random() < 0.5 ? "r" : "c",
      life: celRand(160, 320)
    });
  }
  if (!celRAF) celLoop();
}
function celBurstAt(cx, cy, n) { celSpawn(n, { burst: true, cx: cx, cy: cy }); }
function celFireworksFor(ms, gap) {
  const start = Date.now();
  const fire = () => {
    if (Date.now() - start > ms || !celEl.classList.contains("show")) return;
    celBurstAt(celRand(60, celCv.width - 60), celRand(80, celCv.height * 0.45), 44);
    celFwT = setTimeout(fire, gap);
  };
  fire();
}
// Opening volley: simultaneous bursts from several launch points
// (center + corners) so confetti fills the screen instantly.
function celBurstSpread(n) {
  const W = celCv.width, H = celCv.height;
  const pts = [[W * 0.5, H * 0.45], [W * 0.16, H * 0.32], [W * 0.84, H * 0.32],
               [W * 0.26, H * 0.66], [W * 0.74, H * 0.66]];
  for (const [x, y] of pts) celBurstAt(x, y, n);
}
// Periodic re-bursts for the duration — replaces the old snow-like rain
// with frequent, lively bursts from varied points across the screen.
function celReburstFor(ms, gap, n) {
  const start = Date.now();
  const tick = () => {
    if (Date.now() - start > ms || !celEl.classList.contains("show")) return;
    const W = celCv.width, H = celCv.height;
    celBurstAt(celRand(W * 0.12, W * 0.88), celRand(H * 0.20, H * 0.62), n);
    celBurstAt(celRand(W * 0.12, W * 0.88), celRand(H * 0.20, H * 0.62), n);
    celRainT = setTimeout(tick, gap);
  };
  tick();
}
function celLoop() {
  celRAF = requestAnimationFrame(celLoop);
  celCtx.clearRect(0, 0, celCv.width, celCv.height);
  for (let i = celParts.length - 1; i >= 0; i--) {
    const p = celParts[i];
    p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
    if (p.y > celCv.height + 30 || p.life <= 0) { celParts.splice(i, 1); continue; }
    celCtx.save(); celCtx.translate(p.x, p.y); celCtx.rotate(p.rot);
    celCtx.globalAlpha = Math.max(0, Math.min(1, p.life / 50));
    celCtx.fillStyle = p.color;
    if (p.shape === "r") celCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    else { celCtx.beginPath(); celCtx.arc(0, 0, p.size / 2, 0, 6.28); celCtx.fill(); }
    celCtx.restore();
  }
  if (celParts.length === 0 && !celEl.classList.contains("show")) {
    cancelAnimationFrame(celRAF); celRAF = null;
    celCtx.clearRect(0, 0, celCv.width, celCv.height);
  }
}

const CEL_COPY = {
  small: { icon: "🎉", head: "Milestone!",   sub: "Scriptures completed — keep it going!" },
  half:  { icon: "🚩", head: "Halfway there!", sub: "Half the goal reached — keep pressing on!" },
  m2:    { icon: "🚩", head: "Two-thirds there!", sub: "200,000 reached — keep pressing on!" },
  m3:    { icon: "🚩", head: "Almost there!", sub: "250,000 reached — so close now!" },
  goal:  { icon: "🏆", head: "Goal reached!",  sub: "Praise God — the goal is complete!" }
};

function celShow(level, value, remainingMs) {
  if (celRainT) { clearTimeout(celRainT); celRainT = null; }
  if (celFwT) { clearTimeout(celFwT); celFwT = null; }
  const c = CEL_COPY[level] || CEL_COPY.small;
  $("celIcon").textContent = c.icon;
  $("celHead").textContent = c.head;
  $("celNum").textContent = Number(value).toLocaleString("en-US");
  $("celSub").textContent = c.sub;
  celCurrentLevel = level;
  celEl.classList.add("show");

  // restart the pop animation on the icon
  const ic = $("celIcon"); ic.style.animation = "none"; void ic.offsetWidth; ic.style.animation = "";

  const cx = celCv.width / 2, cy = celCv.height / 2;
  // Confetti runs for the ENTIRE remaining duration (until the overlay closes).
  if (level === "goal") { celBurstSpread(70); celBurstAt(cx, cy, 160); celFireworksFor(remainingMs, 600); celReburstFor(remainingMs, 1400, 60); }
  else if (level === "half" || level === "m2" || level === "m3") { celBurstSpread(55); celBurstAt(cx, cy, 110); celReburstFor(remainingMs, 1800, 70); }
  else { celBurstAt(cx, cy, 90); celReburstFor(remainingMs, 2200, 55); }

  if (celHideT) clearTimeout(celHideT);
  celHideT = setTimeout(celHide, Math.max(1500, remainingMs));
}
function celHide() {
  const wasLevel = celCurrentLevel;
  celCurrentLevel = null;
  celEl.classList.remove("show");
  if (celRainT) { clearTimeout(celRainT); celRainT = null; }
  if (celFwT) { clearTimeout(celFwT); celFwT = null; }
  if (celHideT) { clearTimeout(celHideT); celHideT = null; }
  // After the goal celebration comes down, show the week summary and leave it up.
  if (wasLevel === "goal") showWeekSummary();
}
$("celClose").addEventListener("click", celHide);

// ===== WEEK SUMMARY =====
function showWeekSummary() {
  const { rows } = computeDailyRows();
  const total = state.completedBoxes * state.bookletsPerBox;
  const goalRows = rows.filter((r) => r.dayGoal > 0);
  const hit = goalRows.filter((r) => r.met).length;

  $("sumTotal").textContent = fmt(total);
  $("sumBoxes").textContent = fmt(state.completedBoxes);
  $("sumAvg").textContent = $("perHour").textContent;          // current average/hour
  $("sumDaysHit").textContent = hit + "/" + goalRows.length;

  $("sumDaily").innerHTML = rows.map((d) => {
    const mark = d.met ? '<span class="met">✓</span>' : (d.missed ? " 😞" : "");
    return `<div class="sum-row"><span>${d.label}${mark}</span><b>${fmt(d.scriptures)}</b></div>`;
  }).join("");

  $("summary").classList.remove("hidden");
}
$("sumClose").addEventListener("click", () => $("summary").classList.add("hidden"));

// Admin-only local previews (short auto-close; do NOT broadcast to others).
$("test10k").addEventListener("click", () => celShow("small", 10000, 8000));
$("test150").addEventListener("click", () => celShow("half", 150000, 11000));
$("test300").addEventListener("click", () => celShow("goal", 300000, 13000));

// Manually broadcast a milestone celebration to EVERY device (synced via
// Firebase, exactly like an automatic milestone). Does NOT touch the count.
function broadcastCelebration(level, value) {
  if (!requireReady()) return;                 // needs admin + live connection
  stateRef.child("celebrate").set({
    level: level,
    value: value,
    at: firebase.database.ServerValue.TIMESTAMP
  })
    .then(() => flash("Celebration fired on all devices ✓", true))
    .catch((e) => flash("Couldn't fire celebration: " + e.message));
}
$("fire150").addEventListener("click", () => broadcastCelebration("half", 150000));
$("fire200").addEventListener("click", () => broadcastCelebration("m2", 200000));
$("fire250").addEventListener("click", () => broadcastCelebration("m3", 250000));
$("fireGoal").addEventListener("click", () => broadcastCelebration("goal", 300000));

// ===== PRESENT MODE (projector layout) =====
function enterPresent() {
  document.body.classList.add("present");
  try { (document.documentElement.requestFullscreen || (() => {})).call(document.documentElement); } catch (e) {}
  fitTotal();    // re-fit the big number to the new (wider) layout
  celResize();   // size the confetti canvas to the (about-to-be fullscreen) screen
}
function exitPresent() {
  document.body.classList.remove("present");
  try { if (document.fullscreenElement) document.exitFullscreen(); } catch (e) {}
  fitTotal();
  celResize();
}
$("presentBtn").addEventListener("click", enterPresent);
$("exitPresent").addEventListener("click", exitPresent);
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && document.body.classList.contains("present")) exitPresent(); });
// Fullscreen dimensions settle on this event — re-size canvas + total here too.
document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement && document.body.classList.contains("present")) exitPresent();
  celResize();
  fitTotal();
});

function celDur(level) {
  return level === "goal" ? CELEBRATE.goalMs
       : (level === "half" || level === "m2" || level === "m3") ? CELEBRATE.halfMs
       : CELEBRATE.smallMs;
}

// Single entry point for showing a milestone. Dedupes so the same milestone
// can't double-fire from both the live-count detector and the broadcast.
function fireCelebration(level, value, remainingMs) {
  const key = level + ":" + value;
  const now = Date.now();
  if (shownKeys[key] && now < shownKeys[key]) return;   // already showing/shown recently
  shownKeys[key] = now + celDur(level);
  celShow(level, value, remainingMs);
}

// Broadcast from Firebase — covers late-joiners who open during the window
// (open devices already catch it via the live-count detector below).
function handleCelebrate(c) {
  if (!c || !c.level) return;
  const dur = celDur(c.level);
  const at = Number(c.at) || 0;
  const elapsed = at ? (Date.now() - at) : 0;
  if (elapsed > dur) return;                 // stale (loaded long after) — skip
  fireCelebration(c.level, c.value, dur - Math.max(0, elapsed));
}

// Live-count detector: runs on EVERY device. When the shared total crosses a
// milestone between updates, celebrate locally — no dependency on the writer's
// code version or the broadcast succeeding.
function detectFromTotal(newTotal, perBox) {
  // Only detect when per-box is unchanged (a per-box edit jumps the total
  // without real production and shouldn't fire a celebration).
  if (prevTotal !== null && prevPerBox === perBox && newTotal > prevTotal) {
    const ms = detectMilestone(prevTotal, newTotal);
    if (ms) fireCelebration(ms.level, ms.value, celDur(ms.level));
  }
  prevTotal = newTotal;
  prevPerBox = perBox;
}

// ================================================================
// ADMIN
// ================================================================
const adminToggle = $("adminToggle");
const loginPanel  = $("loginPanel");
const adminPanel  = $("adminPanel");
const adminNote   = $("adminNote");
let isAdmin = false;

adminToggle.addEventListener("click", () => {
  if (isAdmin) {
    adminPanel.classList.toggle("hidden");
    return;
  }
  loginPanel.classList.toggle("hidden");
  if (!loginPanel.classList.contains("hidden")) $("pwInput").focus();
});

function tryUnlock() {
  const val = $("pwInput").value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    loginPanel.classList.add("hidden");
    adminPanel.classList.remove("hidden");
    adminToggle.textContent = "🔓 Admin (unlocked)";
    $("pwErr").textContent = "";
    $("pwInput").value = "";
    $("perBoxInput").value = state.bookletsPerBox;
  } else {
    $("pwErr").textContent = "Wrong password.";
  }
}
$("pwSubmit").addEventListener("click", tryUnlock);
$("pwInput").addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });

$("logoutBtn").addEventListener("click", () => {
  isAdmin = false;
  adminPanel.classList.add("hidden");
  adminToggle.textContent = "🔒 Admin";
});

// ---- Write helpers (guarded) ----
function requireReady() {
  if (!isAdmin) { flash("Unlock admin first."); return false; }
  if (!stateRef || !connected) { flash("Not connected to the database."); return false; }
  return true;
}
function flash(msg, ok) {
  adminNote.textContent = msg;
  adminNote.style.color = ok ? "var(--ok)" : "var(--danger)";
  if (ok) setTimeout(() => { adminNote.textContent = ""; }, 2500);
}

function writeBoxes(newCount) {
  newCount = Math.max(0, Math.floor(newCount));
  const per = state.bookletsPerBox;
  const oldTotal = state.completedBoxes * per;
  const newTotal = newCount * per;
  const milestone = detectMilestone(oldTotal, newTotal);

  stateRef.update({ completedBoxes: newCount, bookletsPerBox: state.bookletsPerBox })
    .then(() => {
      flash("Saved ✓ — everyone's screen just updated.", true);
      // Best-effort: stamp today's cumulative count for the daily breakdown.
      // If this is rejected (rules not updated yet) the core count still saved,
      // but we WARN so the daily history isn't silently lost.
      stateRef.child("days").child(todayKeyET()).set(newCount)
        .catch(() => flash("⚠ Count saved, but daily history is NOT saving — publish the updated database rules (see README).", false));

      // Milestone! Broadcast it so late-joiners (who open during the window)
      // also see it. Open devices already catch it via the live-count detector.
      if (milestone) {
        stateRef.child("celebrate").set({
          level: milestone.level,
          value: milestone.value,
          at: firebase.database.ServerValue.TIMESTAMP
        }).catch(() => {});
      }
    })
    .catch((e) => flash("Save failed: " + e.message));
}

// Which milestone (if any) did we just cross going up?
function detectMilestone(oldTotal, newTotal) {
  if (newTotal <= oldTotal) return null;
  if (oldTotal < CELEBRATE.goalAt && newTotal >= CELEBRATE.goalAt) return { level: "goal", value: CELEBRATE.goalAt };
  if (oldTotal < CELEBRATE.m3At && newTotal >= CELEBRATE.m3At) return { level: "m3", value: CELEBRATE.m3At };
  if (oldTotal < CELEBRATE.m2At && newTotal >= CELEBRATE.m2At) return { level: "m2", value: CELEBRATE.m2At };
  if (oldTotal < CELEBRATE.halfAt && newTotal >= CELEBRATE.halfAt) return { level: "half", value: CELEBRATE.halfAt };
  const oldM = Math.floor(oldTotal / CELEBRATE.smallEvery);
  const newM = Math.floor(newTotal / CELEBRATE.smallEvery);
  if (newM > oldM) return { level: "small", value: newM * CELEBRATE.smallEvery };
  return null;
}

// +1 box
$("plusBox").addEventListener("click", () => {
  if (!requireReady()) return;
  writeBoxes(state.completedBoxes + 1);
});

// remove 1 box
$("minusBox").addEventListener("click", () => {
  if (!requireReady()) return;
  writeBoxes(state.completedBoxes - 1);
});

// add N boxes
$("addBoxesBtn").addEventListener("click", () => {
  if (!requireReady()) return;
  const n = parseInt($("addBoxesInput").value, 10);
  if (isNaN(n)) { flash("Enter a number to add."); return; }
  writeBoxes(state.completedBoxes + n);
  $("addBoxesInput").value = "";
});

// set exact box count
$("setBoxesBtn").addEventListener("click", () => {
  if (!requireReady()) return;
  const n = parseInt($("setBoxesInput").value, 10);
  if (isNaN(n)) { flash("Enter the exact box count."); return; }
  writeBoxes(n);
  $("setBoxesInput").value = "";
});

// set booklets-per-box
$("perBoxBtn").addEventListener("click", () => {
  if (!requireReady()) return;
  const n = parseInt($("perBoxInput").value, 10);
  if (isNaN(n) || n < 1) { flash("Booklets per box must be 1 or more."); return; }
  stateRef.update({ bookletsPerBox: n, completedBoxes: state.completedBoxes })
    .then(() => flash("Booklets-per-box saved ✓", true))
    .catch((e) => flash("Save failed: " + e.message));
});
